# ~/.config/alacritty/alacritty.yml
# maintained by waiel

window:
  padding:
    x: 8
    y: 8
  decorations: buttonless
  opacity: 0.97
  startup_mode: Windowed
  dynamic_title: true

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: "Fira Code"
    style: Regular
  bold:
    family: "Fira Code"
    style: Bold
  italic:
    family: "Fira Code"
    style: Italic
  size: 13.0
  offset:
    x: 0
    y: 2

# Solarized Dark color scheme
colors:
  primary:
    background: '#002b36'
    foreground: '#839496'

  cursor:
    text: '#002b36'
    cursor: '#839496'

  normal:
    black:   '#073642'
    red:     '#dc322f'
    green:   '#859900'
    yellow:  '#b58900'
    blue:    '#268bd2'
    magenta: '#d33682'
    cyan:    '#2aa198'
    white:   '#eee8d5'

  bright:
    black:   '#586e75'
    red:     '#cb4b16'
    green:   '#586e75'
    yellow:  '#657b83'
    blue:    '#839496'
    magenta: '#6c71c4'
    cyan:    '#93a1a1'
    white:   '#fdf6e3'

selection:
  save_to_clipboard: true

cursor:
  style:
    shape: Block
    blinking: On
  blink_interval: 750
  unfocused_hollow: true

live_config_reload: true

shell:
  program: /bin/zsh
  args:
    - --login

key_bindings:
  - { key: N,      mods: Command,       action: SpawnNewInstance }
  - { key: Return, mods: Command|Shift, action: ToggleFullscreen }
  - { key: Equals, mods: Command,       action: IncreaseFontSize }
  - { key: Minus,  mods: Command,       action: DecreaseFontSize }
  - { key: Key0,   mods: Command,       action: ResetFontSize }
  - { key: V,      mods: Command,       action: Paste }
  - { key: C,      mods: Command,       action: Copy }
  - { key: K,      mods: Command,       action: ClearHistory }

mouse:
  hide_when_typing: true
