# ~/.config/alacritty/alacritty.yml
# maintained by waiel

window:
  padding:
    x: 8
    y: 8
  decorations: buttonless
  opacity: 0.97
  startup_mode: Windowed
  dynamic_title: true

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: "Fira Code"
    style: Regular
  bold:
    family: "Fira Code"
    style: Bold
  italic:
    family: "Fira Code"
    style: Italic
  size: 13.0
  offset:
    x: 0
    y: 2

# Gruvbox Dark color scheme
colors:
  primary:
    background: '#282828'
    foreground: '#ebdbb2'

  cursor:
    text: '#282828'
    cursor: '#ebdbb2'

  normal:
    black:   '#282828'
    red:     '#cc241d'
    green:   '#98971a'
    yellow:  '#d79921'
    blue:    '#458588'
    magenta: '#b16286'
    cyan:    '#689d6a'
    white:   '#a89984'

  bright:
    black:   '#928374'
    red:     '#fb4934'
    green:   '#b8bb26'
    yellow:  '#fabd2f'
    blue:    '#83a598'
    magenta: '#d3869b'
    cyan:    '#8ec07c'
    white:   '#ebdbb2'

selection:
  save_to_clipboard: true

cursor:
  style:
    shape: Block
    blinking: On
  blink_interval: 750
  unfocused_hollow: true

live_config_reload: true

shell:
  program: /bin/zsh
  args:
    - --login

key_bindings:
  - { key: N,      mods: Command,       action: SpawnNewInstance }
  - { key: Return, mods: Command|Shift, action: ToggleFullscreen }
  - { key: Equals, mods: Command,       action: IncreaseFontSize }
  - { key: Minus,  mods: Command,       action: DecreaseFontSize }
  - { key: Key0,   mods: Command,       action: ResetFontSize }
  - { key: V,      mods: Command,       action: Paste }
  - { key: C,      mods: Command,       action: Copy }
  - { key: K,      mods: Command,       action: ClearHistory }

mouse:
  hide_when_typing: true
