# ~/.tmux.conf
# maintained by waiel

# ============================================================================
# General
# ============================================================================
# Remap prefix from C-b to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Reduce escape time
set -sg escape-time 0

# Enable mouse support
set -g mouse on

# 256 color terminal
set -g default-terminal "screen-256color"

# ============================================================================
# Key Bindings
# ============================================================================
# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift+arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# ============================================================================
# Copy Mode (vi-style)
# ============================================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ============================================================================
# Status Bar
# ============================================================================
set -g status-position bottom
set -g status-justify left
set -g status-interval 2
set -g status-style 'bg=colour235 fg=colour248'

# Left: session name
set -g status-left-length 30
set -g status-left '#[fg=colour232,bg=colour154,bold] #S #[fg=colour154,bg=colour238,nobold]#[fg=colour222,bg=colour238] #(whoami) #[fg=colour238,bg=colour235]'

# Right: date and time
set -g status-right-length 60
set -g status-right '#[fg=colour238,bg=colour235]#[fg=colour222,bg=colour238] %a %b %d #[fg=colour154,bg=colour238]#[fg=colour232,bg=colour154,bold] %H:%M '

# Window tabs
setw -g window-status-current-style 'fg=colour232 bg=colour39 bold'
setw -g window-status-current-format ' #I:#W#F '

setw -g window-status-style 'fg=colour248 bg=colour236'
setw -g window-status-format ' #I:#W#F '

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# ============================================================================
# Pane Borders
# ============================================================================
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour51'
